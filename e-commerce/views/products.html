<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">TOKLEN ಠಿ_ಠ</h1>

<div class="filter">
    <button onclick="filterCategory('All')">All</button>
    <button onclick="filterCategory('Buah')">Buah</button>
    <button onclick="filterCategory('Fashion')">Fashion</button>
    <button onclick="filterCategory('Elektronik')">Elektronik</button>
</div>

<div class="container" id="products"></div>

<div class="cart-box">
    <h2>Keranjang</h2>
    <ul id="cart"></ul>
    <h3>Total: Rp <span id="total">0</span></h3>
</div>

<script>
const products = [
    { name: "Jeruk", price: 12000, image: "images/Jeruk.jpg", category: "Buah" },
    { name: "Pir", price: 20000, image: "images/Pir.jpg", category: "Buah" },
    { name: "Apel", price: 15000, image: "images/Apel.jpg", category: "Buah" },

    { name: "T-Shirt Nirvana", price: 85000, image: "images/T-Shirt Nirvana.jpg", category: "Fashion" },
    { name: "T-Shirt Smashing Pumpkins", price: 76000, image: "images/T-Shirt The Smashing Pumpkins.jpg", category: "Fashion" },
    { name: "Grey Sweater", price: 100000, image: "images/Grey Sweater.jpg", category: "Fashion" },

    { name: "Laptop", price: 5500000, image: "images/Laptop.jpg", category: "Elektronik" },
    { name: "Handphone", price: 1500000, image: "images/Handphone.jpg", category: "Elektronik" },
    { name: "Kamera", price: 6000000, image: "images/Kamera.jpg", category: "Elektronik" },
];

let cart = [];
let currentCategory = "All";

function filterCategory(category) {
    currentCategory = category;
    renderProducts();
}

function renderProducts() {
    const container = document.getElementById("products");
    container.innerHTML = "";

    const filtered = currentCategory === "All"
        ? products
        : products.filter(p => p.category === currentCategory);

    filtered.forEach((p) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${p.image}">
            <h4>${p.name}</h4>
            <p>Rp ${p.price}</p>
            <button onclick='addToCart(${JSON.stringify(p)})'>Masukkan</button>
        `;

        container.appendChild(div);
    });
}

function addToCart(product) {
    cart.push(product);
    renderCart();
}

function renderCart() {
    const cartList = document.getElementById("cart");
    cartList.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${item.name} - Rp ${item.price}
            <button onclick="removeFromCart(${index})">X</button>
        `;

        cartList.appendChild(li);
        total += item.price;
    });

    document.getElementById("total").textContent = total;
}

function removeFromCart(index) {
    cart.splice(index, 1);
    renderCart();
}

renderProducts();
</script>

</body>
</html>
